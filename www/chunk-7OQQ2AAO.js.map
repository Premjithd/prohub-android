<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="logo-circle">yP</div>
      <div class="header-text">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your yProHub account</p>
      </div>
    </div>

    <!-- User Type Selection -->
    <div class="user-type-selector">
      <label>Sign in as</label>
      <div class="type-buttons">
        <button
          type="button"
          class="type-btn"
          [class.active]="userType === 'user'"
          (click)="userType = 'user'"
        >
          Customer
        </button>
        <button
          type="button"
          class="type-btn"
          [class.active]="userType === 'pro'"
          (click)="userType = 'pro'"
        >
          Professional
        </button>
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          ngModel
          required
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          ngModel
          required
          placeholder="Enter your password"
        />
        <div class="forgot-link">
          <a [routerLink]="['/auth/forgot-password']">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!loginForm.valid || isLoading">
        {{ isLoading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <div class="register-link">
      <p>Don't have an account? <a [routerLink]="['/auth/register']">Create one here</a></p>
    </div>

  </div>
</div>
