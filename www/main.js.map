<mat-toolbar color="primary">
  <button mat-icon-button (click)="onToggleSidenav()" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/" class="brand" aria-label="yProHub home">
    <img src="assets/logo/logo-mark-white.svg" alt="" class="brand-logo" />
    <span>yProHub</span>
  </a>
  <span class="spacer"></span>

  <ng-container *ngIf="!auth.isAuthenticated()">
    <button mat-button routerLink="/auth/login">Login</button>
    <button mat-raised-button color="accent" class="custom-btn" routerLink="/auth/register">Register</button>
  </ng-container>

  <ng-container *ngIf="auth.isAuthenticated()">
    <!-- Show name only on desktop -->
    <span class="welcome-text">{{ auth.getName() }}</span>
    <!-- Notification bell — Pro users only -->
    <button *ngIf="isProUser()" mat-icon-button routerLink="/notifications" aria-label="Notifications"
      [matBadge]="unreadCount > 0 ? unreadCount : null" matBadgeColor="warn" matBadgeSize="small">
      <mat-icon>notifications</mat-icon>
    </button>
    <button mat-icon-button routerLink="/profile" aria-label="Profile">
      <mat-icon>person</mat-icon>
    </button>
    <button mat-icon-button (click)="onLogout()" aria-label="Sign out">
      <mat-icon>logout</mat-icon>
    </button>
  </ng-container>
</mat-toolbar>
