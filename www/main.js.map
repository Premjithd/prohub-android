<div *ngIf="auth.isImpersonating()" class="impersonation-banner">
  <mat-icon>engineering</mat-icon>
  <span>Admin mode — browsing as <strong>{{ auth.getName() }}</strong> ({{ auth.getUserType() }})</span>
  <button class="exit-impersonation-btn" (click)="exitImpersonation()">
    <mat-icon>logout</mat-icon>
    Exit Impersonation
  </button>
</div>

<mat-sidenav-container>
  <mat-sidenav #sidenav mode="over">
    <app-sidebar (menuItemClicked)="sidenav.close()"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content>
    <app-navbar (toggleSidenav)="sidenav.toggle()"></app-navbar>

    <main class="main-content">
      <div class="container">
        <router-outlet></router-outlet>
      </div>
    </main>

    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- Fixed bottom navigation (visible on mobile only) -->
<app-bottom-nav></app-bottom-nav>
